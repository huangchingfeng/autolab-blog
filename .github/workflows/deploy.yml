name: Build and Deploy Blog

on:
  push:
    branches: [main]
    paths: ['articles/**', 'blog/**/thumbnail.png']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install markdown pyyaml pymdown-extensions Pygments

      - name: Build all articles and rebuild site
        run: |
          python3 << 'PYEOF'
          from publish_blog import publish_article, rebuild_site, ARTICLES_DIR

          for md in sorted(ARTICLES_DIR.glob("*.md")):
              print(f"Building: {md.name}")
              publish_article(str(md))

          print("\nRebuilding site...")
          rebuild_site()
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
