name: Build and Deploy Blog

on:
  push:
    branches: [main]
    paths: ['articles/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install markdown pyyaml pymdown-extensions Pygments

      - name: Build all articles and rebuild site
        run: |
          python3 << 'PYEOF'
          from publish_blog import publish_article, rebuild_site, ARTICLES_DIR

          # Build each article
          for md in sorted(ARTICLES_DIR.glob("*.md")):
              print(f"Building: {md.name}")
              publish_article(str(md))

          # Rebuild index + sitemap
          print("\nRebuilding site...")
          rebuild_site()
          PYEOF

      - name: Commit and push built files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add blog/
          git diff --cached --quiet || (git commit -m "build: auto-deploy blog" && git push)
