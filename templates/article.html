<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title} — 阿峰老師</title>
  <meta name="description" content="${description}">
  <meta name="keywords" content="${keywords}">
  <meta name="author" content="${author}">
  <link rel="canonical" href="${canonical}">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="${title}">
  <meta property="og:description" content="${description}">
  <meta property="og:image" content="${og_image}">
  <meta property="og:url" content="${canonical}">
  <meta property="og:site_name" content="阿峰老師 Autolab">
  <meta property="og:locale" content="zh_TW">
  <meta property="article:author" content="${author}">
  <meta property="article:published_time" content="${date}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="${title}">
  <meta name="twitter:description" content="${description}">
  <meta name="twitter:image" content="${og_image}">

  <!-- JSON-LD -->
  <script type="application/ld+json">${json_ld}</script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="${site_url}/static/style.css">
</head>
<body>
  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="https://www.autolab.cloud" class="nav-brand">
        <span>Autolab</span> 阿峰老師
      </a>
      <div class="nav-links">
        <a href="${site_url}/">Blog</a>
        <a href="https://www.autolab.cloud">官網</a>
        <a href="https://reurl.cc/GGlLNx">LINE 社群</a>
      </div>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="article-header">
    <div class="article-meta">
      <span>${date}</span>
      <span>${author}</span>
    </div>
    <h1>${title}</h1>
    <div class="card-tags">${tags}</div>
  </header>

  <!-- YouTube -->
  ${youtube}

  <!-- CONTENT -->
  <article class="article-content">
    ${content}
  </article>

  <!-- CTA -->
  <div class="cta-box">
    <div class="cta-box-inner">
      <h3>想用 AI 解決真問題？</h3>
      <p>加入阿峰老師的 AI 實戰社群，一起從觀念到落地。</p>
      <a href="https://reurl.cc/GGlLNx" class="cta-btn">加入 LINE 社群</a>
      <div class="cta-links">
        <a href="https://www.autolab.cloud">官網</a>
        <a href="mailto:ai@autolab.cloud">聯繫合作</a>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>&copy; 2026 Autolab — 黃敬峰（AI峰哥）. All rights reserved.</p>
    <p style="margin-top:8px">
      <a href="${site_url}/">Blog</a> ·
      <a href="https://www.autolab.cloud">官網</a> ·
      <a href="https://reurl.cc/GGlLNx">LINE 社群</a>
    </p>
  </footer>
</body>
</html>
